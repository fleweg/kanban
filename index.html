<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <!-- Prevent Chrome / browser auto-translate from rewriting text nodes,
         which conflicts with React reconciliation (see facebook/react#11538). -->
    <meta name="google" content="notranslate" />
    <title>Kanban — Sprints &amp; Backlog</title>
    <script>
      // Anti-FOUC: apply the saved theme synchronously, before React renders,
      // so users in dark mode never see a flash of light content.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "dark" || stored === "light" ? stored : prefersDark ? "dark" : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime config bootstrap — must load synchronously, before the
         main bundle, so the Firebase resolver can read
         window.__FLEXWEG_CONFIG__ during module init.

         document.write injects a cache-busted script tag during HTML
         parsing; the browser processes it synchronously before the
         next <script>. A plain `<script src="./config.js">` would be
         subject to HTTP / CDN caching, and after the first-run setup
         uploads a populated config.js to Flexweg, the very next reload
         could serve the stale (null-stub) version from cache —
         re-displaying the SetupForm instead of the authenticated app.
         The ?_t timestamp forces a fresh fetch on every load.
         See public/config.js for the file contents. -->
    <script>
      document.write(
        '<script src="./config.js?_t=' + Date.now() + '"><\/script>'
      );
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
